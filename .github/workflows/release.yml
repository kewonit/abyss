name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Phase 1: Create a GitHub release ──────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(jq -r '.version' tauri-host/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Abyss v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true

  # ── Phase 2: Build on each platform & upload artifacts ────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            rust-targets: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu
          - platform: macos-arm
            os: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-intel
            os: macos-13
            rust-targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows
            os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Linux system deps required by Tauri / WebKit
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-host/src-tauri

      # Frontend deps must be installed before Tauri's beforeBuildCommand runs
      - name: Install frontend dependencies
        working-directory: visualizer
        run: npm ci

      - name: Build Tauri app & upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-host
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
